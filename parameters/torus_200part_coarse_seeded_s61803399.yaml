# N=200 relaxation, DIFFERENT SEED (61803399) -- seed-sensitivity test.
# Branch: fix/phase1-energy-discretization. Identical to
# torus_200part_coarse_seeded.yaml (lambda=7.0) in EVERY respect except the seed
# (84172851 -> 61803399). lambda is held at 7.0 ON PURPOSE so any change is
# attributable to the seed alone -- the companion arm to
# torus_200part_coarse_seeded_lam9.yaml (which isolates lambda at the old seed).
#
# WHY: the lambda=7.0 / seed=84172851 run (run_20260711_192121) kept all 200
# cells alive but left two diffuse-mass runts, cell 17 (-38.4%) and cell 58
# (-31.2%). Those two are the fewest-win cells -- a plausible SEED-SPECIFIC bad
# placement at the coarse L0 (48 verts/cell), frozen in by warm-start. The doc
# explicitly recommends "try other seeds" for this failure
# (docs/reference/winner_take_all_partition_gap.md).
#
# 2x1 DESIGN:
#   this file  (new seed, lambda=7): clean at 3 levels => runts were a seeding
#              accident, not a lambda deficiency.
#   lam9 file  (old seed, lambda=9): clean => lambda was the fix.
#   both still bad => systematic N=200 limit (L0 representability at 48 v/cell).
#
# READOUT (solution/metadata.yaml): dormant_cells empty, and the area_imbalance
# block -- is n_imbalanced back to 0/1 with worst_rel_dev modest, or are there
# again 2+ deep (-30%+) runts (at whatever cell indices this seed produces)?

experiment:
  name: torus-200-coarse-seeded-s61803399
  surface: torus

relaxation:
  n_partitions: 200
  lambda_penalty: 7.0                  # UNCHANGED from the baseline run -- isolate the seed
  seed: 61803399                       # NEW independent draw (was 84172851)
  init_method: seeded                 # mandatory at high N
  max_iter: 30000
  refinement_levels: 3                # Step-1 validity check; resume winner to 5 via --resume-from
  use_analytic: true
  use_discrete_area_for_constraints: true

  pgd_step0: 1.0
  pgd_armijo_c: 0.0001
  pgd_backtrack_rho: 0.5
  pgd_projection_max_iter: 300
  pgd_projection_tol: 1.0e-9

  enable_refinement_triggers: true
  refine_trigger_mode: full
  refine_patience: 30
  refine_delta_energy: 1.0e-8
  refine_grad_tol: 1.0e-2
  refine_constraint_tol: 1.0e-2
  refine_gnorm_patience: 30
  refine_gnorm_delta: 1.0e-4
  refine_feas_patience: 30
  refine_feas_delta: 1.0e-6

  penalty_target_mode: fixed
  penalty_eps: 1.0e-8

  run_log_frequency: 500
  h5_save_stride: 500
  h5_save_vars: ["x"]
  h5_always_save_first_last: true
  profile: true

surface:
  torus:
    n_theta: 100                      # UNCHANGED; levels: 100x96, 162x154, 224x212, 286x270, 348x328
    n_phi: 96
    R: 1.0
    r: 0.6
    n_theta_increment: 62
    n_phi_increment: 58

refinement:
  method: ipopt
  max_iterations: 19
  max_opt_iter: 200
  tolerance: 1.0e-7
  boundary_tol: 0.001
  lbfgs_memory: 30
  exact_hessian: true
  best_iterate: true
  allow_partial_convergence: true
  save_iterations: true
  distance_preservation: preserve
