# Sweep: lambda_penalty x seed for 30-partition torus
#
# Mesh overridden below to a lighter resolution for fast local testing
# (the base config torus_30part.yaml uses 90x76):
#   surface.torus.n_theta = 60   (base resolution along major circle)
#   surface.torus.n_phi   = 46   (base resolution along tube circle)
#   relaxation.refinement_levels = 3    (3 levels: 60x46 -> 122x104 -> 184x162)
# Increments (n_theta_increment = 62, n_phi_increment = 58) come from the
# base_config and are not swept.
#
# Strategy: grid -> 3 lambdas x 2 seeds x 1 mesh = 6 runs (local test subset)

name: lambda-seed
base_config: parameters/torus_30part.yaml

sweep:
  relaxation.n_partitions: [30]
  relaxation.lambda_penalty: [1.9, 2.0, 2.1]
  relaxation.seed: [13131313, 84172851]
  relaxation.refinement_levels: [3]
  resolution:
    surface.torus.n_theta: [60]
    surface.torus.n_phi:   [46]

strategy: grid
