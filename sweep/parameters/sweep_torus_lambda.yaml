# Sweep: lambda_penalty x seed for 30-partition torus
#
# Mesh pinned to the base config (torus_30part.yaml):
#   surface.torus.n_theta = 90   (base resolution along major circle)
#   surface.torus.n_phi   = 76   (base resolution along tube circle)
#   relaxation.refinement_levels = 3    (3 levels: 90x76 -> 214x192 -> 276x250)
# Increments (n_theta_increment = 62, n_phi_increment = 58) come from the
# base_config and are not swept.
#
# Strategy: grid -> 5 lambdas x 5 seeds x 1 mesh = 25 runs

name: lambda-seed
base_config: parameters/torus_30part.yaml

sweep:
  relaxation.n_partitions: [30]
  relaxation.lambda_penalty: [1.8, 1.9, 2.0, 2.1, 2.2]
  relaxation.seed: [13131313, 84172851, 52698790, 55369783, 24513201]
  relaxation.refinement_levels: [3]
  resolution:
    surface.torus.n_theta: [90]
    surface.torus.n_phi:   [76]

strategy: grid
