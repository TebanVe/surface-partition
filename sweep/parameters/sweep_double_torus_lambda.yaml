# Sweep: lambda_penalty × resolution (grouped) for 10-partition double torus
# Resolution parameters are grouped so n_grid_x and n_grid_y scale together.
# Strategy: grid → 4 × 3 = 12 runs

name: lambda-resolution
base_config: parameters/double_torus_10part.yaml

sweep:
  relaxation.lambda_penalty: [1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
  resolution:
    surface.double_torus.n_grid_x: [54, 64, 74, 84]
    surface.double_torus.n_grid_y: [40, 50, 60, 70]

strategy: grid
